name: R Tests

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        r-version: ['devel', 'release', 'oldrel-1', 'oldrel-2']

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}
          use-public-rspm: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libhdf5-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            freeglut3-dev \
            cmake \
            git \
            lsof \
            autoconf

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install hdf5 cmake autoconf automake libtool
          brew install --cask basictex
          echo "/Library/TeX/texbin" >> $GITHUB_PATH

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools

      - name: Build and install package
        run: |
          R CMD build .
          R CMD INSTALL RMINC*.tar.gz

      - name: Run R CMD check
        run: |
          R CMD check --as-cran --no-install RMINC*.tar.gz

      - name: Show R CMD check log
        if: always()
        run: |
          if [ -f RMINC.Rcheck/00check.log ]; then
            cat RMINC.Rcheck/00check.log
          fi

      - name: Run tests
        run: |
          Rscript -e "\
          testr <- devtools::test(); \
          testr <- as.data.frame(testr); \
          if(any(testr\$error) || any(testr\$warning > 0)) \
            stop('Found failing tests') \
          "

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: check-results-${{ matrix.os }}-R${{ matrix.r-version }}
          path: RMINC.Rcheck/
