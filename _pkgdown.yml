url: https://mouse-imaging-centre.github.io/RMINC/
destination: docs

development:
  mode: release

template:
  bootstrap: 5

reference:
  - title: "Package overview"
    contents:
      - RMINC-package

  - title: "Voxel-wise statistics"
    desc: "Massively-univariate models fit independently at every voxel."
    contents:
      - mincLm
      - mincAnova
      - mincTtest
      - mincPairedTtest
      - mincWilcoxon
      - mincCorrelation
      - mincLogLikRatio
      - mincLogLikRatioParametricBootstrap

  - title: "Voxel summaries & effect sizes"
    contents:
      - mincMean
      - mincSd
      - mincSum
      - mincVar
      - mincSummary
      - mincTable
      - mincEffectSize

  - title: "Voxel mixed-effects models"
    contents:
      - mincLmer
      - mincLmerEstimateDF

  - title: "Multiple comparisons (voxel)"
    contents:
      - mincFDR
      - mincFDRMask
      - mincFDRThresholdVector
      - mincTFCE
      - mincRandomize
      - thresholds

  - title: "Surface / vertex statistics"
    desc: "Vertex-wise models for cortical surface data."
    contents:
      - vertexLm
      - vertexLmer
      - vertexLmerEstimateDF
      - vertexAnova
      - vertexApply
      - vertexAtlasApply
      - vertexEffectSize
      - vertexFDR
      - vertexFindPeaks
      - vertexLookup
      - vertexSelect
      - vertexMean
      - vertexSd
      - vertexSum
      - vertexVar
      - vertexTFCE
      - vertexTable
      - writeVertex

  - title: "ROI / anatomy analysis (flat)"
    contents:
      - anatLm
      - anatLmer
      - anatLmerEstimateDF
      - anatAnova
      - anatApply
      - anatCombineStructures
      - anatCreateVolume
      - anatEffectSize
      - anatFDR
      - anatGetAll
      - anatGetAll_old
      - as.data.frame.anatMatrix
      - voxel_atlas_defs
      - anatMean
      - anatSd
      - anatSum
      - anatSummarize
      - anatToVolume
      - anatVar

  - title: "Hierarchical anatomy atlases"
    contents:
      - starts_with("hanat")
      - addVolumesToHierarchy
      - makeMICeDefsHierachical

  - title: "Model selection"
    contents:
      - compare_models
      - AICc
      - flexLm

  - title: "Parallel & HPC execution"
    desc: "batchtools-based local and cluster parallelism."
    contents:
      - mincApply
      - mincApplyRCPP
      - pMincApply
      - mcMincApply
      - starts_with("qMinc")
      - runRMINCTestbed
      - verboseRun

  - title: "I/O & low-level access"
    contents:
      - mincGetVolume
      - mincWriteVolume
      - mincArray
      - mincGetVoxel
      - mincGetWorldVoxel
      - mincVectorToVoxelCoordinates
      - mincConvertTagToMincArrayCoordinates
      - mincConvertVoxelToWorld
      - mincConvertWorldToVoxel
      - mincConvertVoxelMatrix
      - mincConvertWorldMatrix
      - minc.dimensions.sizes
      - minc.separation.sizes
      - minc.get.hyperslab
      - minc.get.history
      - minc.append.history
      - mincAttributes
      - setMincAttributes
      - mincGetTagFile
      - mincSelectRandomVoxels
      - mincFindPeaks
      - mincLabelPeaks
      - mincFileCheck
      - mincGetMask
      - mincGetVector
      - extract_column
      - volume.combineMaskVolumes
      - volume.explodeLabelVolume

  - title: "MINC object helpers"
